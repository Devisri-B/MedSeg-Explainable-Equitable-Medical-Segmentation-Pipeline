# Default configuration for MedSeg-RAI.
# Override any field with `--config path/to/your.yaml` or CLI flags (see medseg/train.py).
# These defaults reproduce the baseline run (CE + Dice, resnet34 U-Net).

data:
  name: pannuke              # dataset label
  root: data/pannuke         # folder holding the PanNuke folds
  image_size: 256
  num_classes: 6
  class_names: [Background, Neoplastic, Inflammatory, Connective, Dead, Epithelial]
  train_folds: [1, 2]        # PanNuke ships as 3 folds; we train on 1+2, test on 3
  test_fold: 3
  val_fraction: 0.15         # carved from the training folds for validation
  batch_size: 8
  num_workers: 2
  augment: true
  stain_aug: false           # HED stain jitter on the training set
  limit: 0                   # subsample N images per fold for a quick run (0 = all)

model:
  arch: unet                 # unet | unetplusplus | deeplabv3plus | fpn | manet
  encoder: resnet34          # any segmentation-models-pytorch encoder name
  encoder_weights: imagenet  # set to null for fully-offline / from-scratch training
  pretrained: true

train:
  epochs: 40
  lr: 0.0003
  weight_decay: 0.0001
  optimizer: adamw
  scheduler: cosine          # cosine | none
  ce_weight: 1.0
  dice_weight: 1.0           # weight of the overlap (seg) loss term
  include_background_in_dice: false
  seg_loss: dice             # dice | tversky | focal_tversky
  tversky_alpha: 0.3
  tversky_beta: 0.7
  focal_gamma: 1.3333
  class_weight_scheme: median  # median | sqrt | none
  class_weight_clip: 0.0     # cap on max class weight (0 = no cap)
  select_metric: mean_dice_fg  # mean_dice_fg | mean_dice_robust
  robust_exclude: []         # classes excluded from the robust mean
  seed: 42
  device: auto               # auto | mps | cuda | cpu
  amp: false                 # keep false on Apple MPS
  grad_clip: 0.0
  early_stop_patience: 10
  val_interval: 1
  output_dir: outputs
  run_name: pannuke_unet
